<html>
    <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>


<body>
    <div class="btnplace">
    <button id="reset"><i   class="fa-solid fa-arrow-rotate-right"></i></button>
<h1 class="title"><b>ROCK PAPER SCISSORS</b></h1></div>

<!--   ALL CHOICES IN THIS DIV     -->
<div class="choices">

  <!--          for rock           -->
    <div class="choice" id="rock">
        <img src="stone.png">
    </div>

  <!--         for paper           -->
    <div class="choice" id="paper">
        <img src="paper.png">
    </div>

<!--          for scissor          -->
    <div class="choice" id="scissors">
        <img src="scissor.png">
    </div>
</div>

<div class=scorecard>

    <div class="score">
        <p id="userscore">0</p>
        <p><b>YOU</b></p>
    </div>
    <div class="score">
        <p id="compscore">0</p>
        <p><b>COMPUTER</b></p>
    </div>

</div>
<div class="msgcontainer">
    <p id="msg"> Play Your Move</p>
</div>
<h3 id="informer"></h3>
<script src="script.js"></script>

</body>
</html>
